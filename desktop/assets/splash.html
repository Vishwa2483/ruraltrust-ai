<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RuralTrust AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 500px;
      height: 350px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .card {
      width: 480px;
      height: 330px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      border-radius: 20px;
      border: 1px solid rgba(99, 102, 241, 0.3);
      box-shadow: 
        0 25px 60px rgba(0, 0, 0, 0.8),
        0 0 40px rgba(99, 102, 241, 0.15),
        inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .logo-container {
      position: relative;
      z-index: 1;
    }

    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
      animation: spin-slow 4s linear infinite;
      position: relative;
    }

    @keyframes spin-slow {
      0% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.5); }
      50% { box-shadow: 0 0 50px rgba(139, 92, 246, 0.8); }
      100% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.5); }
    }

    .logo-inner {
      width: 80px;
      height: 80px;
      background: #0f172a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .text-section {
      text-align: center;
      z-index: 1;
    }

    .app-name {
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .app-name span {
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .progress-section {
      width: 300px;
      z-index: 1;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
      border-radius: 2px;
      animation: load 2.5s ease-in-out forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 70%; }
      80% { width: 85%; }
      100% { width: 100%; }
    }

    .loading-text {
      margin-top: 8px;
      font-size: 11px;
      color: #475569;
      text-align: center;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .version {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 10px;
      color: #334155;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">
      <div class="logo-ring">
        <div class="logo-inner">🌱</div>
      </div>
    </div>
    <div class="text-section">
      <div class="app-name">Rural<span>Trust</span> AI</div>
      <div class="tagline">Intelligent Rural Governance</div>
    </div>
    <div class="progress-section">
      <div class="progress-bar-bg">
        <div class="progress-bar"></div>
      </div>
      <div class="loading-text">Connecting to server...</div>
    </div>
    <div class="version">v1.0.0</div>
  </div>
</body>
</html>
